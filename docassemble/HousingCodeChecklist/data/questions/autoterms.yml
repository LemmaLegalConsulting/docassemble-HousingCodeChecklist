id: terms
terms:
  condemned: |
    If a unit is condemned, the tenants must move out. 
    <BR>
    A unit can be condemned if housing inspectors find it to be **illegal**, **overcrowded**, or **uninhabitable**.
  green words: |
    Green words are **legal terms** or **short explanations**. When you click on green words, a definition or explanation will pop up.
  illegal unit: |
    An illegal unit is one that has not been properly registered with the City or Town. 
    <BR>
    <BR>
    Illegal units are often in converted attics or basements that do not meet basic safety or sanitary code standards.
  overcrowded: |
    A rental unit is considered overcrowded if there is not enough space for all the tenants. 
    <BR>
    <BR>
    Generally, there may be overcrowding if a bedroom is not large enough for the number of people using it, according to the MA State Sanitary Code (105 CMR 410.420(D)).
  RAFT: |
    Residential Assistance for Families in Transition (RAFT) is a state rental assistance program that tenants can use to help pay their rent every 12 months. 
    <BR>
    <BR>
    Tenants in public or subsidized housing are limited to 6 months of their portion of the rent, but tenants without a subsidy can receive up to $7000 per year. 
    <BR>
    <BR>
    To learn more, search for RAFT online or visit [the Mass.gov page](https://www.mass.gov/how-to/apply-for-raft-emergency-help-for-housing-costs).
  retaliation: |
    Retaliation includes evicting you or raising your rent because you complained about housing problems. Retaliation is against the law. The court can protect you from retaliation.
    <BR>
    <BR>
    However, your landlord **can still raise the rent for other legitimate reasons**. 
    It is **not retaliation** if your landlord raises the rent to:
    
      * Make a higher profit.
      * Match their actual expenses for the unit.
      * Match the current market rate of the unit.
  uninhabitable: |
    A unit is uninhabitable if the Board of Health finds that it is unsuitable for people to live in **or** it is not possible to repair the unit while tenants are still living there.